description: Linux Copy

compatible: "linux-cpy"

properties:
  vcpu_num:
    type: int
    description: |
      Number of virtual CPUs for each Linux VM (supports SMP).
    required: true
  max_mem_size:
    type: int
    description: |
      Max size of memory region
    required: true
  reg:
    type: array
    required: true
    description: |
      Reg regions for the VM.

  dtb_addr:
    type: int
    description: |
      Base address of the VM device tree file.
    required: true
  dtb_size:
    type: int
    description: |
      Size of the VM device tree file.
    required: true

  image_addr:
    type: int
    description: |
      Base address of the VM device tree file.
    required: true
  image_size:
    type: int
    description: |
      Size of the VM device tree file.
    required: true

  rootfs_addr:
    type: int
    description: |
      Base address of the VM device tree file.
    required: true
  rootfs_size:
    type: int
    description: |
      Size of the VM device tree file.
    required: true