# Project configuration
# Copyright 2021-2022 HNU


# kernel vm size(1024M virt ram start + size)
# 1024 - 64M Mbit
CONFIG_KERNEL_VM_SIZE=0xC0000000

# vgic device.
CONFIG_VM_VGICV3=y

# vuart device.
CONFIG_VM_VSERIAL=y

# syscon device
CONFIG_VM_SYSCON_CONTROLLER=y

# fiq debugger
CONFIG_VM_FIQ_DEBUGGER=n
CONFIG_VM_CLOCK_SYSTEM_CONTROLLER=y

#Virt IO
CONFIG_VM_VIRTIO_MMIO=y
CONFIG_VM_VIRTIO_BLK=y
CONFIG_VM_VIRTIO_NET=y
# sd
CONFIG_DISK_ACCESS=y
CONFIG_ROCKCHIP_SDHC=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_DISK_DRIVERS=y
CONFIG_SDMMC_SUBSYS=y
CONFIG_SDMMC_STACK=y
CONFIG_MAIN_STACK_SIZE=8192

CONFIG_TIMESLICE_SIZE=20