# hypervisor need 1024M of virtual space.
CONFIG_KERNEL_VM_SIZE=0xC0000000

# virtual device.
CONFIG_VM_VGICV3=y
CONFIG_VM_VSERIAL=y

CONFIG_TIMESLICE_SIZE=20

# RAM Disk
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_RAM=y